spring.application.name=foodiesapi
spring.data.mongodb.uri=mongodb://localhost:27017/foodies

# Temp directory configuration to fix Tomcat startup issues
server.tomcat.basedir=${java.io.tmpdir}/tomcat
spring.web.resources.static-locations=file:${java.io.tmpdir}/

aws.access.key=${AWS_ACCESS_KEY}
aws.secret.key=${AWS_SECRET_KEY}
aws.region=ap-south-1
aws.s3.bucketname=foodies-foods-tdb
aws.s3.region=eu-north-1
jwt.secret.key=${JWT_SECRET_KEY}

# Razorpay configuration - using default values for development
razorpay_key=${RAZORPAY_KEY}
razorpay_secret=${RAZORPAY_SECRET}
